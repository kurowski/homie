name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/hm-linux-${GOARCH} \
            ./cmd/hm

      - name: Checksum
        run: |
          cd dist
          sha256sum hm-linux-${{ matrix.goarch }} > hm-linux-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: hm-linux-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd dist
          # Each matrix job wrote one .sha256; combine into a single
          # SHA256SUMS file alongside the binaries so bootstrap.sh can
          # fetch one file and verify either arch.
          cat *.sha256 > SHA256SUMS
          rm -- *.sha256
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
