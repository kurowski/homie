# TLS sidecar for the bootstrap hero — a verbatim lift of the e2e harness's
# nginx config (e2e/webserver_test.go). Two HTTPS vhosts on one cert (picked by
# SNI): impersonates raw.githubusercontent.com (serves bootstrap.sh) and
# github.com (serves the hm release artifacts + the demo repo over dumb HTTP).
events {}

http {
    default_type application/octet-stream;
    types {
        text/plain                              txt sh;
        application/x-git-packed-objects-toc    .idx;
        application/x-git-packed-objects        .pack;
    }
    sendfile on;
    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 443 ssl;
        server_name raw.githubusercontent.com;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        root /var/www/raw;
        location / {
            try_files $uri =404;
        }
    }

    server {
        listen 443 ssl default_server;
        server_name github.com;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        root /var/www/github;

        # Bare git repos via dumb HTTP (update-server-info was run at prep time).
        location ~ \.git(/.*)?$ {
            autoindex off;
        }

        location / {
            try_files $uri =404;
        }
    }
}
